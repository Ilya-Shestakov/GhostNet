<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Одно устройство — одна сессия</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #6c63ff;
            --text: #e0e0ff;
            --muted: #a0a0c0;
            --gold: #f0b90b;
            --red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
            color: var(--text);
        }

        .container {
            width: 100%;
            max-width: 720px;
            background: var(--card);
            border-radius: 2rem;
            padding: 1.5rem 1.5rem 2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scene {
            position: relative;
            width: 100%;
            height: 360px;
            background: linear-gradient(145deg, #1e2a3a 0%, #0f172a 100%);
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 1.2rem;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.6);
        }

        .desc {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--muted);
            margin-bottom: 1rem;
            min-height: 2.5rem;
            text-align: center;
            padding: 0 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

        .btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0.7rem 1.8rem;
            border-radius: 3rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(108,99,255,0.3);
        }

        .btn:hover { background: #7c73ff; }
        .btn:active { background: #5a52d5; }
        .btn:disabled { opacity: 0.15; pointer-events: none; box-shadow: none; }

        /* Объекты сцены */
        .device {
            position: absolute;
            bottom: 40px;
            width: 70px;
            height: 120px;
            background: #2d3a4f;
            border-radius: 14px;
            border: 2px solid #4a5a70;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .device::before { content: ''; width: 32px; height: 4px; background: #4a5a70; border-radius: 4px; margin-bottom: 8px; }
        .device::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: #4a5a70; position: absolute; bottom: 12px; }

        .device-label {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--muted);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .device-a { left: 12%; }
        .device-b { right: 12%; }

        .database {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 50px;
            background: #3f4b63;
            border-radius: 8px 8px 4px 4px;
            border: 2px solid #5e6e8e;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 6;
        }

        .database::before { content: ''; width: 54px; height: 6px; background: #5e6e8e; border-radius: 4px; position: absolute; top: -3px; }
        .db-label { font-size: 0.7rem; color: var(--muted); font-weight: 600; letter-spacing: 0.4px; margin-top: 2px; }

        .floating {
            position: absolute;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            pointer-events: none;
            z-index: 20;
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .floating.visible { opacity: 1; }

        .key-icon, .lock-icon { width: 44px; height: 44px; }

        .message-box {
            background: rgba(20, 25, 40, 0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #4a5a70;
            border-radius: 1rem;
            padding: 10px 18px;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            white-space: nowrap;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6);
        }

        .encrypted-box {
            border-color: var(--gold);
            background: rgba(20, 20, 30, 0.95);
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            color: #fbbf24;
        }

        .error-box {
            border-color: var(--red) !important;
            color: #fca5a5 !important;
            background: rgba(30, 20, 20, 0.95) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="desc" id="stepDesc">Нажмите «Далее», чтобы узнать, почему нельзя сидеть с двух устройств одновременно</div>

    <div class="scene" id="scene">
        <div class="database" id="db"><span class="db-label">БД</span></div>
        <div class="device device-a" id="devA"><div class="device-label">Устройство А</div></div>
        <div class="device device-b" id="devB"><div class="device-label">Новое устр-во Б</div></div>

        <div class="floating" id="privKeyA"><svg class="key-icon" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="1.8"><path d="M21 2L15 8M21 2L14 9M21 2L19 8.5M15 8C15 8 11 6 8 9C5 12 6 16 6 16L9 19C9 19 13 20 16 17C19 14 17 10 17 10L21 2Z"/><circle cx="8" cy="17" r="2"/></svg></div>
        <div class="floating" id="pubKeyA"><svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
        <div class="floating" id="privKeyB"><svg class="key-icon" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="1.8"><path d="M21 2L15 8M21 2L14 9M21 2L19 8.5M15 8C15 8 11 6 8 9C5 12 6 16 6 16L9 19C9 19 13 20 16 17C19 14 17 10 17 10L21 2Z"/><circle cx="8" cy="17" r="2"/></svg></div>
        <div class="floating" id="pubKeyB"><svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>

        <div class="floating message-box" id="msgBox"></div>
        <div class="floating message-box encrypted-box" id="encBox"></div>
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn" disabled>← Назад</button>
        <button class="btn" id="nextBtn">Далее →</button>
    </div>
</div>

<script>
    (function() {
        const scene = document.getElementById('scene');
        const desc = document.getElementById('stepDesc');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        const devA = document.getElementById('devA');
        const devB = document.getElementById('devB');
        const db = document.getElementById('db');

        const privKeyA = document.getElementById('privKeyA');
        const pubKeyA = document.getElementById('pubKeyA');
        const privKeyB = document.getElementById('privKeyB');
        const pubKeyB = document.getElementById('pubKeyB');
        const msgBox = document.getElementById('msgBox');
        const encBox = document.getElementById('encBox');

        let currentStep = 0;
        const TOTAL_STEPS = 6; // шаги 0…6

        let positions = {};

        function updatePositions() {
            const sceneRect = scene.getBoundingClientRect();
            const getCenter = el => {
                const r = el.getBoundingClientRect();
                return { x: r.left - sceneRect.left + r.width / 2, y: r.top - sceneRect.top + r.height / 2 };
            };

            const posA = getCenter(devA);
            const posB = getCenter(devB);
            const posDB = getCenter(db);

            positions = {
                devA: {
                    priv: { x: posA.x - 35, y: posA.y - 30 },
                    pub: { x: posA.x + 10, y: posA.y - 45 },
                    msg: { x: posA.x - 60, y: posA.y - 90 }
                },
                devB: {
                    priv: { x: posB.x + 35, y: posB.y - 30 },
                    pub: { x: posB.x - 10, y: posB.y - 45 },
                    msg: { x: posB.x - 20, y: posB.y - 90 }
                },
                db: {
                    pubA: { x: posDB.x - 45, y: posDB.y + 20 },
                    pubB: { x: posDB.x + 15, y: posDB.y + 20 },
                    center: { x: posDB.x - 50, y: posDB.y + 50 }
                }
            };
        }

        function setPos(el, coords, visible = true) {
            if (visible) {
                el.classList.add('visible');
            } else {
                el.classList.remove('visible');
            }
            el.style.transform = `translate(${coords.x}px, ${coords.y}px)`;
        }

        function applyStep(step) {
            // Сброс дополнительных классов
            encBox.classList.remove('error-box');
            msgBox.textContent = '';
            encBox.textContent = '';

            switch(step) {
                case 0:
                    desc.textContent = 'Нажмите «Далее», чтобы узнать, почему нельзя использовать два устройства одновременно';
                    setPos(privKeyA, positions.devA.priv, false);
                    setPos(pubKeyA, positions.devA.pub, false);
                    setPos(privKeyB, positions.devB.priv, false);
                    setPos(pubKeyB, positions.devB.pub, false);
                    setPos(msgBox, positions.devA.msg, false);
                    setPos(encBox, positions.devA.msg, false);
                    break;
                case 1:
                    desc.textContent = 'Устройство А авторизовано в мессенджере. Его публичный ключ хранится на сервере';
                    setPos(privKeyA, positions.devA.priv);
                    setPos(pubKeyA, positions.db.pubA);
                    setPos(privKeyB, positions.devB.priv, false);
                    setPos(pubKeyB, positions.devB.pub, false);
                    setPos(msgBox, positions.devA.msg, false);
                    setPos(encBox, positions.devA.msg, false);
                    break;
                case 2:
                    desc.textContent = 'Пользователь пытается войти с нового устройства Б';
                    // визуально ничего не меняем, только описание
                    setPos(privKeyA, positions.devA.priv);
                    setPos(pubKeyA, positions.db.pubA);
                    setPos(privKeyB, positions.devB.priv, false);
                    setPos(pubKeyB, positions.devB.pub, false);
                    setPos(msgBox, positions.devA.msg, false);
                    setPos(encBox, positions.devA.msg, false);
                    break;
                case 3:
                    desc.textContent = 'Устройство Б генерирует новую пару ключей (приватный и публичный)';
                    setPos(privKeyA, positions.devA.priv);
                    setPos(pubKeyA, positions.db.pubA);
                    setPos(privKeyB, positions.devB.priv);
                    setPos(pubKeyB, positions.devB.pub);
                    setPos(msgBox, positions.devA.msg, false);
                    setPos(encBox, positions.devA.msg, false);
                    break;
                case 4:
                    desc.textContent = 'Новый публичный ключ Б отправляется на сервер. Старый ключ А удаляется';
                    setPos(privKeyA, positions.devA.priv);
                    setPos(pubKeyA, positions.db.pubA, false); // старый ключ исчезает
                    setPos(privKeyB, positions.devB.priv);
                    setPos(pubKeyB, positions.db.pubB);         // новый ключ в БД
                    setPos(msgBox, positions.devA.msg, false);
                    setPos(encBox, positions.devA.msg, false);
                    break;
                case 5:
                    desc.textContent = 'Устройство А пытается отправить сообщение, но сервер отвергает: ключ А удалён';
                    setPos(privKeyA, positions.devA.priv);
                    setPos(pubKeyA, positions.db.pubA, false);
                    setPos(privKeyB, positions.devB.priv);
                    setPos(pubKeyB, positions.db.pubB);
                    // сообщение на устройстве А
                    msgBox.textContent = 'Привет';
                    setPos(msgBox, positions.devA.msg);
                    // ошибка от сервера
                    encBox.textContent = 'Ошибка';
                    encBox.classList.add('error-box');
                    setPos(encBox, positions.db.center);
                    break;
                case 6:
                    desc.textContent = 'Сессия на устройстве А принудительно завершена. Только одно устройство может быть активно';
                    setPos(privKeyA, positions.devA.priv, false); // ключи А пропадают
                    setPos(pubKeyA, positions.db.pubA, false);
                    setPos(privKeyB, positions.devB.priv);
                    setPos(pubKeyB, positions.db.pubB);
                    // сообщение на А о завершении сессии
                    msgBox.textContent = 'Сессия завершена';
                    setPos(msgBox, positions.devA.msg);
                    setPos(encBox, positions.devA.msg, false); // ошибку убираем
                    break;
            }

            prevBtn.disabled = (step === 0);
            nextBtn.disabled = (step === TOTAL_STEPS);
        }

        function goToStep(step) {
            currentStep = Math.min(TOTAL_STEPS, Math.max(0, step));
            applyStep(currentStep);
        }

        nextBtn.addEventListener('click', () => {
            if (currentStep < TOTAL_STEPS) goToStep(currentStep + 1);
        });
        prevBtn.addEventListener('click', () => {
            if (currentStep > 0) goToStep(currentStep - 1);
        });

        window.addEventListener('resize', () => {
            updatePositions();
            applyStep(currentStep);
        });

        // Старт
        updatePositions();
        goToStep(0);
    })();
</script>

</body>
</html>
