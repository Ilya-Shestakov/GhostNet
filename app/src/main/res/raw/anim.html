<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Шифрование в мессенджере</title>
    <style>
        /* стили точно такие же, как в предыдущей версии, только убираем finish-btn */
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #6c63ff;
            --text: #e0e0ff;
            --muted: #a0a0c0;
            --gold: #f0b90b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:1rem; color: var(--text); }
        .container { width:100%; max-width:720px; background: var(--card); border-radius:2rem; padding:1.5rem 1.5rem 2rem; box-shadow:0 25px 50px rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; }
        .scene { position:relative; width:100%; height:360px; background:linear-gradient(145deg, #1e2a3a 0%, #0f172a 100%); border-radius:1.5rem; overflow:hidden; margin-bottom:1.2rem; box-shadow:inset 0 2px 8px rgba(0,0,0,0.6); }
        .desc { font-size:0.95rem; font-weight:500; color: var(--muted); margin-bottom:1rem; min-height:2.5rem; text-align:center; padding:0 0.5rem; }
        .controls { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
        .btn { background: var(--accent); border:none; color:white; padding:0.7rem 1.8rem; border-radius:3rem; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all 0.2s; letter-spacing:0.3px; box-shadow:0 4px 14px rgba(108,99,255,0.3); }
        .btn:hover { background:#7c73ff; }
        .btn:active { background:#5a52d5; }
        .btn:disabled { opacity:0.4; pointer-events:none; box-shadow:none; }

        /* объекты сцены */
        .device { position:absolute; bottom:40px; width:70px; height:120px; background:#2d3a4f; border-radius:14px; border:2px solid #4a5a70; box-shadow:0 10px 20px rgba(0,0,0,0.5); display:flex; flex-direction:column; align-items:center; justify-content:center; transition:all 0.6s cubic-bezier(0.25,0.1,0.15,1.2); z-index:5; }
        .device::before { content:''; width:32px; height:4px; background:#4a5a70; border-radius:4px; margin-bottom:8px; }
        .device::after { content:''; width:10px; height:10px; border-radius:50%; background:#4a5a70; position:absolute; bottom:12px; }
        .device-label { position:absolute; bottom:-28px; left:50%; transform:translateX(-50%); font-size:0.7rem; font-weight:600; color:var(--muted); white-space:nowrap; text-transform:uppercase; letter-spacing:0.5px; }
        .device-a { left:12%; }
        .device-b { right:12%; }
        .database { position:absolute; top:30px; left:50%; transform:translateX(-50%); width:80px; height:50px; background:#3f4b63; border-radius:8px 8px 4px 4px; border:2px solid #5e6e8e; box-shadow:0 6px 12px rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; z-index:6; }
        .database::before { content:''; width:54px; height:6px; background:#5e6e8e; border-radius:4px; position:absolute; top:-3px; }
        .db-label { font-size:0.7rem; color:var(--muted); font-weight:600; letter-spacing:0.4px; margin-top:8px; }

        .floating { position:absolute; transition:all 0.7s cubic-bezier(0.2,0.0,0,1.0); pointer-events:none; z-index:20; opacity:0; display:flex; align-items:center; justify-content:center; }
        .floating.visible { opacity:1; }
        .key-icon, .lock-icon { width:44px; height:44px; }
        .message-box { background:rgba(20,25,40,0.9); backdrop-filter:blur(8px); border:2px solid #4a5a70; border-radius:1rem; padding:10px 18px; font-size:1rem; font-weight:500; color:white; white-space:nowrap; box-shadow:0 8px 16px rgba(0,0,0,0.6); }
        .encrypted-box { border-color:var(--gold); background:rgba(20,20,30,0.95); font-family:'Courier New',monospace; letter-spacing:1px; color:#fbbf24; }
    </style>
</head>
<body>
<div class="container">
    <div class="desc" id="stepDesc">Нажмите «Далее», чтобы увидеть, как работает шифрование</div>
    <div class="scene" id="scene">
        <div class="database" id="db"><span class="db-label">БД</span></div>
        <div class="device device-a" id="devA"><div class="device-label">Устройство А</div></div>
        <div class="device device-b" id="devB"><div class="device-label">Устройство Б</div></div>

        <div class="floating" id="privKeyA"><svg class="key-icon" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="1.8"><path d="M21 2L15 8M21 2L14 9M21 2L19 8.5M15 8C15 8 11 6 8 9C5 12 6 16 6 16L9 19C9 19 13 20 16 17C19 14 17 10 17 10L21 2Z"/><circle cx="8" cy="17" r="2"/></svg></div>
        <div class="floating" id="pubKeyA"><svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
        <div class="floating" id="privKeyB"><svg class="key-icon" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="1.8"><path d="M21 2L15 8M21 2L14 9M21 2L19 8.5M15 8C15 8 11 6 8 9C5 12 6 16 6 16L9 19C9 19 13 20 16 17C19 14 17 10 17 10L21 2Z"/><circle cx="8" cy="17" r="2"/></svg></div>
        <div class="floating" id="pubKeyB"><svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" stroke-width="1.8"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg></div>
        <div class="floating message-box" id="msgBox"></div>
        <div class="floating message-box encrypted-box" id="encBox"></div>
    </div>
    <div class="controls">
        <button class="btn" id="prevBtn" disabled>← Назад</button>
        <button class="btn" id="nextBtn">Далее →</button>
    </div>
</div>
<script>
    (function() {
        const scene = document.getElementById('scene');
        const desc = document.getElementById('stepDesc');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const devA = document.getElementById('devA');
        const devB = document.getElementById('devB');
        const db = document.getElementById('db');
        const privKeyA = document.getElementById('privKeyA');
        const pubKeyA = document.getElementById('pubKeyA');
        const privKeyB = document.getElementById('privKeyB');
        const pubKeyB = document.getElementById('pubKeyB');
        const msgBox = document.getElementById('msgBox');
        const encBox = document.getElementById('encBox');
        const allFloating = [privKeyA, pubKeyA, privKeyB, pubKeyB, msgBox, encBox];
        let currentStep = 0;
        const TOTAL_STEPS = 11;

        function getPos(el) {
            const rect = el.getBoundingClientRect();
            const sceneRect = scene.getBoundingClientRect();
            return {
                left: rect.left - sceneRect.left + rect.width/2,
                top: rect.top - sceneRect.top + rect.height/2
            };
        }
        function hideAllFloating() {
            allFloating.forEach(el => { el.classList.remove('visible'); el.style.left='0px'; el.style.top='0px'; el.style.transition='none'; });
            scene.offsetHeight;
            allFloating.forEach(el => el.style.transition='');
        }
        function showEl(el, left, top) {
            el.classList.add('visible');
            el.style.left = left + 'px';
            el.style.top = top + 'px';
        }
        function applyStep(step) {
            hideAllFloating();
            msgBox.textContent = '';
            encBox.textContent = '';
            const aPos = getPos(devA);
            const bPos = getPos(devB);
            const dbPos = getPos(db);
            const privOffsetX = -35, privOffsetY = -30, pubOffsetX = 10, pubOffsetY = -45;
            switch(step) {
                case 0: desc.textContent = 'Нажмите «Далее», чтобы увидеть, как работает шифрование'; break;
                case 1: desc.textContent = 'Устройства А и Б регистрируются в мессенджере'; break;
                case 2: desc.textContent = 'На каждом устройстве генерируется пара ключей';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(pubKeyA, aPos.left+pubOffsetX, aPos.top+pubOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyB, bPos.left-pubOffsetX, bPos.top+pubOffsetY); break;
                case 3: desc.textContent = 'Публичные ключи отправляются в базу данных';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    showEl(pubKeyB, dbPos.left+45, dbPos.top+20); break;
                case 4: desc.textContent = 'Устройство А пишет сообщение для Б';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    showEl(pubKeyB, dbPos.left+45, dbPos.top+20);
                    msgBox.textContent = 'Привет'; showEl(msgBox, aPos.left-60, aPos.top-90); break;
                case 5: desc.textContent = 'Приложение берёт публичный ключ Б из базы';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    showEl(pubKeyB, dbPos.left+45, dbPos.top+20);
                    msgBox.textContent = 'Привет'; showEl(msgBox, aPos.left-60, aPos.top-90);
                    pubKeyB.style.left = (aPos.left-20)+'px'; pubKeyB.style.top = (aPos.top-80)+'px'; break;
                case 6: desc.textContent = 'Сообщение шифруется публичным ключом';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    encBox.textContent = 'a3f7c2...'; showEl(encBox, aPos.left-60, aPos.top-90); break;
                case 7: desc.textContent = 'Зашифрованное сообщение отправляется на сервер';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    encBox.textContent = 'a3f7c2...'; showEl(encBox, dbPos.left-50, dbPos.top+50); break;
                case 8: desc.textContent = 'Сервер доставляет сообщение устройству Б';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    encBox.textContent = 'a3f7c2...'; showEl(encBox, bPos.left+30, bPos.top-90); break;
                case 9: desc.textContent = 'Приватный ключ Б расшифровывает сообщение';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-privOffsetX, bPos.top+privOffsetY);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    encBox.textContent = 'a3f7c2...'; showEl(encBox, bPos.left+30, bPos.top-90);
                    privKeyB.style.left = (bPos.left-5)+'px'; privKeyB.style.top = (bPos.top-70)+'px'; break;
                case 10: desc.textContent = 'Сообщение расшифровано! Только Б видит текст';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-5, bPos.top-70);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    msgBox.textContent = 'Привет'; showEl(msgBox, bPos.left+30, bPos.top-90); break;
                case 11: desc.textContent = '✅ Приватный ключ никогда не покидает устройство. Данные в безопасности';
                    showEl(privKeyA, aPos.left+privOffsetX, aPos.top+privOffsetY);
                    showEl(privKeyB, bPos.left-5, bPos.top-70);
                    showEl(pubKeyA, dbPos.left-45, dbPos.top+20);
                    msgBox.textContent = 'Привет'; showEl(msgBox, bPos.left+30, bPos.top-90); break;
            }
            prevBtn.disabled = (step===0);
            if (step===TOTAL_STEPS) { nextBtn.style.display='none'; } else { nextBtn.style.display='inline-block'; }
        }
        function goToStep(step) { currentStep = Math.min(TOTAL_STEPS, Math.max(0, step)); applyStep(currentStep); }
        nextBtn.addEventListener('click', ()=> { if(currentStep<TOTAL_STEPS) goToStep(currentStep+1); });
        prevBtn.addEventListener('click', ()=> { if(currentStep>0) goToStep(currentStep-1); });
        window.addEventListener('resize', ()=> applyStep(currentStep));
        goToStep(0);
    })();
</script>
</body>
</html>
